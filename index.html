<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIYMOD | AI Minecraft Mods</title>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* Top Left Logo */
        .header { padding: 15px; display: flex; align-items: center; }
        .logo-img { width: 80px; height: auto; border-radius: 5px; }

        /* AI Button */
        .ai-container { text-align: center; margin-top: 40px; padding: 20px; }
        .ai-btn { 
            background: linear-gradient(45deg, #ffffff, #888);
            color: black; border: none; padding: 20px 40px; 
            border-radius: 15px; font-weight: bold; font-size: 1.5rem;
            cursor: pointer; box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* Bottom Navigation Bar */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: #1a1a1a; display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #333;
        }
        .nav-item { color: white; text-decoration: none; font-size: 0.8rem; text-align: center; background: none; border: none; }
        .plus-circle { 
            background: #fff; color: #000; width: 50px; height: 50px; 
            border-radius: 50%; display: flex; justify-content: center; 
            align-items: center; font-size: 30px; margin-top: -30px;
            border: 4px solid #0f0f0f; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="DIY (2).png" alt="DIYMOD Logo" class="logo-img">
    </div>

    <div class="ai-container">
        <button class="ai-btn" onclick="startAI()">Diymod.Ai</button>
        <p style="color: #00d4ff; margin-top: 15px;">AI Minecraft Mod Generator</p>
        <small>Creates .mcworld & behavior files</small>
    </div>

    <div class="bottom-nav">
        <button class="nav-item" onclick="openNeeded()">🛠️<br>Needed</button>
        <div class="plus-circle" onclick="postFile()">+</div>
        <button class="nav-item" onclick="openAccount()">👤<br>Account</button>
    </div>

    <script>
        function startAI() {
            let modReq = prompt("What mod should I create? (e.g., 'Fire-breathing cows')");
            if(modReq) {
                alert("Diymod.Ai is generating your file... Please wait.");
                alert("File generated! Copy the code and use ZArchiver to move it to your Minecraft folder.");
            }
        }
        function openNeeded() {
            alert("To use DIYMOD you need:\n1. This Website\n2. ZArchiver App (from Play Store)");
        }
        function postFile() {
            alert("Please Login to your Account to paste and public your mod file.");
        }
        function openAccount() {
            alert("Login / Sign Up page coming soon!");
        }
    </script>
</body>
          </html>
